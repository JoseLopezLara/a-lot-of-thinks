# ==============================================================================
# DOMAIN: Server Utilities (server-utils)
# Description: Utility endpoints for the server, such as retrieving the time.
# ==============================================================================

paths:
  /server-utils/get-time:
    get:
      tags:
        - Server Utilities
      summary: Get server time
      description: |
        Returns the current server time in ISO 8601 format along with the server timezone.
      responses:
        '200':
          description: Server time successfully retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerTimeResponse'

components:
  schemas:
    ServerTimeResponse:
      type: object
      required:
        - server_time
        - timezone
      properties:
        server_time:
          type: string
          description: The current date and time on the server in ISO 8601 format.
          example: "2026-07-10T20:16:30-06:00"
        timezone:
          type: string
          description: The timezone configured on the server.
          example: "America/Costa_Rica"
