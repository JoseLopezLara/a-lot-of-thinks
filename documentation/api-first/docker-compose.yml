services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastapi-sandbox-api
    ports:
      - "${API_PORT:-8102}:8000"
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - API_PORT=${API_PORT:-8102}
    restart: always
